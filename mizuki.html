<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizuki | Ashen One</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Spectral:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --ds-bg: rgba(10, 10, 10, 0.94);
            --ds-border: rgba(194, 163, 125, 0.3);
            --ds-gold: #c2a37d;
            --ds-ember: #ff4500;
            --text-main: #a5a5a5;
            --ds-glow: rgba(255, 69, 0, 0.2);
        }

        /* КАСТОМНЫЙ СКРОЛЛБАР */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: var(--ds-gold); }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000;
            color: var(--text-main);
            font-family: 'Spectral', serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain_Noise.png');
            opacity: 0.03; pointer-events: none; z-index: 9999;
        }

        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)), 
                        url('https://i.pinimg.com/736x/9e/e3/3c/9ee33cd1ab74d6ed304eb2d5dcfb4b97.jpg');
            background-size: cover; background-position: center;
            z-index: -1;
        }

/* МЯГКАЯ, ЕДВА ЗАМЕТНАЯ ВИБРАЦИЯ */
@keyframes ds-shake {
    0% { transform: translate(0, 0); }
    20% { transform: translate(-0.5px, 0px); }
    40% { transform: translate(0.5px, 0.5px); }
    60% { transform: translate(-0.5px, -0.5px); }
    80% { transform: translate(0.5px, 0px); }
    100% { transform: translate(0, 0); }
}

.shaking {
    /* Увеличили время до 0.4s для плавности */
    animation: ds-shake 0.4s linear infinite !important;
    /* Оставляем мягкое свечение */
    box-shadow: 0 0 80px rgba(194, 163, 125, 0.15) !important;
    transition: box-shadow 1s ease;
}

        /* НИК MIZUKI */
        .glitch {
            color: #fff;
            font-size: 3.5rem;
            letter-spacing: 20px;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            animation: ember-glow 4s infinite ease-in-out;
        }

        @keyframes ember-glow {
            0%, 100% { text-shadow: 0 0 10px rgba(194, 163, 125, 0.2); color: #eee; }
            50% { text-shadow: 0 0 25px var(--ds-ember); color: #fff; }
        }

        .window {
            width: 820px; height: 560px; max-width: 95vw;
            background: var(--ds-bg);
            border: 1px solid var(--ds-border);
            border-radius: 2px;
            box-shadow: 0 0 60px rgba(0,0,0,1);
            display: flex; flex-direction: column; position: absolute;
            z-index: 10; transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s;
        }
.window.closed { 
    transform: scale(0.95) translateY(20px); 
    opacity: 0; 
    pointer-events: none; 
}
        

        .window-header {
            height: 38px; display: flex; align-items: center;
            justify-content: space-between; padding: 0 16px;
            cursor: move; border-bottom: 1px solid rgba(194, 163, 125, 0.1);
            background: rgba(0,0,0,0.5);
        }
        
        .window-title {
            color: var(--ds-gold); font-size: 11px; letter-spacing: 3px; 
            text-transform: uppercase; font-family: 'Cinzel', serif;
        }

        .window-title i {
    animation: ember-flicker 2s infinite alternate;
}

@keyframes ember-flicker {
    0% { opacity: 0.8; filter: drop-shadow(0 0 2px var(--ds-ember)); }
    100% { opacity: 1; filter: drop-shadow(0 0 8px var(--ds-ember)); }
}

        .window-controls { display: flex; }
        .win-btn {
            width: 40px; height: 38px; display: flex;
            align-items: center; justify-content: center;
            font-size: 13px; transition: 0.2s; cursor: pointer; color: #555;
        }
        .win-btn:hover { color: var(--ds-gold); }

        .window-body {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px; position: relative;
        }
        
        .avatar-frame {
            width: 130px; height: 130px; border-radius: 50%;
            overflow: hidden; border: 1px solid var(--ds-gold);
            margin-bottom: 30px; filter: grayscale(0.5) contrast(1.2);
            box-shadow: 0 0 30px rgba(194, 163, 125, 0.1);
        }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .status-bar { 
            margin: 25px 0; font-family: 'Spectral', serif; 
            color: var(--ds-gold); font-style: italic;
            font-size: 1.1rem; letter-spacing: 1px;
        }

        .win-action-btn {
            background: transparent; color: var(--ds-gold); border: 1px solid var(--ds-gold);
            padding: 12px 45px; letter-spacing: 5px; cursor: pointer; 
            transition: 0.5s; margin-bottom: 30px; text-transform: uppercase;
            font-family: 'Cinzel', serif; font-size: 12px;
        }
        .win-action-btn:hover { background: var(--ds-gold); color: #000; box-shadow: 0 0 30px var(--ds-glow); }

        .socials { display: flex; gap: 35px; font-size: 1.3rem; margin-bottom: 20px; }
        .socials a { color: var(--ds-gold); opacity: 0.4; transition: 0.4s; }
        .socials a:hover { opacity: 1; transform: translateY(-3px); filter: drop-shadow(0 0 8px var(--ds-gold)); }

        #restore-btn {
            position: fixed; opacity: 0; visibility: hidden;
            background: #000; border: 1px solid var(--ds-gold);
            color: var(--ds-gold); padding: 15px 35px; cursor: pointer; z-index: 100;
            font-family: 'Cinzel', serif; letter-spacing: 3px;
        }
        #restore-btn.visible { opacity: 1; visibility: visible; }

        #hack-overlay {
    display: none; 
    position: absolute; 
    top: 0; 
    left: 0;
    width: 100%; 
    height: 100%; 
    background: #080808;
    color: var(--ds-gold); 
    /* Уменьшаем первый параметр (top) до 15px */
    padding: 30px 30px 30px 30px;
    font-family: 'Consolas', monospace; 
    z-index: 100; 
    box-sizing: border-box; 
    overflow-y: auto;
    scrollbar-width: none;
}

        .footer-credits { font-size: 10px; opacity: 0.2; letter-spacing: 4px; text-transform: uppercase; }

        @media (max-width: 600px) {
            .glitch { font-size: 2.2rem; letter-spacing: 8px; }
            .window { width: 95vw; height: 500px; }
        }
    </style>
</head>
<body>

<div class="noise"></div>
<div class="background"></div>

<button id="restore-btn" onclick="openWindow()">
    <i class="fa-solid fa-fire-flame-curved" style="margin-right: 10px;"></i> RISE, ASHEN ONE
</button>

<div class="window" id="dsWindow">
    <div class="window-header" id="windowHeader">
    <div class="window-title">
        <i class="fa-solid fa-fire-flame-curved" style="color: var(--ds-ember); margin-right: 8px; filter: drop-shadow(0 0 5px var(--ds-ember));"></i>
        Mizuki Protocol
    </div>
    <div class="window-controls">
        <div class="win-btn" onclick="closeWindow()"><i class="fa-solid fa-minus"></i></div>
        <div class="win-btn close" onclick="closeWindow()"><i class="fa-solid fa-xmark"></i></div>
    </div>
</div>
    
    <div class="window-body">
        <div id="hack-overlay"></div>
        <div class="avatar-frame">
            <img src="https://i.pinimg.com/1200x/7b/56/70/7b5670bba7a7c0e2faacf6de087ff9f4.jpg" alt="mizuki">
        </div>
        <div class="glitch">mizuki</div>
        <div class="status-bar"><span id="typing"></span></div>
        <button class="win-action-btn" onclick="initBonfire()">Возжечь костер</button>
        <div class="socials">
           <a href="https://t.me/Sofia_heheh" target="_blank" title="Telegram">
                <i class="fab fa-telegram"></i>
            </a>  
            <a href="https://steamcommunity.com/profiles/76561198770796803" target="_blank" title="Steam">
                <i class="fab fa-steam"></i>
            </a>
            <a href="https://arimadev.ru/arima" title="Вернуться к Arima (Silent Hill)">
                <i class="fa-solid fa-door-open"></i>
            </a>
        </div>
        <div class="footer-credits">© 2026 MIZUKI. THE FIRE FADES</div>
    </div>
</div>

<script>
    const win = document.getElementById('dsWindow');
    const header = document.getElementById('windowHeader');
    const restoreBtn = document.getElementById('restore-btn');
    const typingSpan = document.getElementById('typing');
    const fullText = "Ashen one, hearest thou my voice still?";
    let charIdx = 0;

    let isDragging = false;
    let startX, startY, startLeft, startTop;

    function startDragging(e) {
        if (e.target.closest('.window-controls')) return;
        isDragging = true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        startX = clientX; startY = clientY;
        startLeft = win.offsetLeft; startTop = win.offsetTop;
        win.style.transition = 'none'; 
    }

    function moveWindow(e) {
        if (!isDragging) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        let newX = startLeft + (clientX - startX);
        let newY = startTop + (clientY - startY);

        const maxX = window.innerWidth - win.offsetWidth;
        const maxY = window.innerHeight - win.offsetHeight;

        if (newX < 0) newX = 0; if (newX > maxX) newX = maxX;
        if (newY < 0) newY = 0; if (newY > maxY) newY = maxY;

        win.style.left = newX + 'px';
        win.style.top = newY + 'px';
        win.style.transform = 'none'; 
    }

    function stopDragging() {
        isDragging = false;
        win.style.transition = 'transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s';
    }

    header.addEventListener('mousedown', startDragging);
    document.addEventListener('mousemove', moveWindow);
    document.addEventListener('mouseup', stopDragging);

    function centerWindow() {
        const x = (window.innerWidth - win.offsetWidth) / 2;
        const y = (window.innerHeight - win.offsetHeight) / 2;
        win.style.left = x + 'px'; win.style.top = y + 'px';
        win.style.transform = 'none';
    }

    function closeWindow() {
        win.style.opacity = '0';
        win.style.transform = 'scale(0.9) translateY(20px)';
        setTimeout(() => { 
            win.style.display = 'none';
            restoreBtn.classList.add('visible'); 
        }, 500);
    }

    function openWindow() {
        restoreBtn.classList.remove('visible');
        win.style.display = 'flex';
        centerWindow();
        setTimeout(() => { 
            win.style.opacity = '1';
            win.style.transform = 'scale(1) translateY(0)';
            resetTyping(); 
        }, 50);
    }

    function resetTyping() { typingSpan.innerHTML = ""; charIdx = 0; type(); }

    function type() {
        if (charIdx < fullText.length) {
            typingSpan.innerHTML += fullText.charAt(charIdx);
            charIdx++; setTimeout(type, 60);
        }
    }

    // DVD MODE
    let dvdActive = false;
    let dvdPos = { x: 0, y: 0, dx: 3, dy: 3 };
    let dvdInterval;
    let inputBuffer = "";

    document.addEventListener('keydown', (e) => {
        inputBuffer += e.key.toLowerCase();
        if (inputBuffer.endsWith("dvd")) {
            toggleDVDMode();
            inputBuffer = "";
        }
        if (inputBuffer.length > 10) inputBuffer = inputBuffer.substring(1);
    });

    function toggleDVDMode() {
        dvdActive = !dvdActive;
        if (dvdActive) {
            dvdPos.x = win.offsetLeft; dvdPos.y = win.offsetTop;
            win.style.transition = "none";
            dvdInterval = setInterval(animateDVD, 16);
        } else {
            clearInterval(dvdInterval);
            win.style.borderColor = "var(--ds-border)";
            win.style.boxShadow = "0 0 60px rgba(0,0,0,1)";
            win.style.transition = '0.5s';
        }
    }

    function animateDVD() {
        if (!dvdActive || isDragging) return;
        const screenW = window.innerWidth, screenH = window.innerHeight;
        const winW = win.offsetWidth, winH = win.offsetHeight;

        dvdPos.x += dvdPos.dx; dvdPos.y += dvdPos.dy;
        let hit = false;

        if (dvdPos.x + winW >= screenW || dvdPos.x <= 0) { dvdPos.dx *= -1; hit = true; }
        if (dvdPos.y + winH >= screenH || dvdPos.y <= 0) { dvdPos.dy *= -1; hit = true; }

        if (hit) {
            const colors = ['#c2a37d', '#ff4500', '#ffd700', '#ff8c00'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            win.style.borderColor = color;
            win.style.boxShadow = `0 0 40px ${color}44`;
        }
        win.style.left = dvdPos.x + 'px'; win.style.top = dvdPos.y + 'px';
    }

    // BONFIRE TERMINAL
    function initBonfire() {
        const overlay = document.getElementById('hack-overlay');
        overlay.style.display = 'block';
        overlay.innerHTML = "";
        win.classList.add('shaking'); 

        const lines = [
            "> Gathering residual humanity...",
            "> Linking to the First Flame...",
            "> [OK] Firelink Shrine connection established",
            "> Loading soul profile: MIZUKI",
            "> Warning: Hollowing level critical",
            "--------------------------------",
            "> 'Yes, indeed. It is called Lothric...'",
            "> 'The fire fades, and the lords go without thrones.'",
            "> 'Touch the darkness within me.'",
            "--------------------------------",
            "> Status: Unkindled / Embers sought",
            "> Fragment 01: 'Lordvessel acquired'",
            "> Fragment 02: 'Be wary of despair'",
            "> [!] ALERT: Darkwraith intrusion detected",
            "--------------------------------",
            "> Transposing soul data...",
            "> Ritual complete. Rise, Mizuki."
        ];

        let lineIdx = 0;
        function printLines() {
            if (lineIdx < lines.length) {
                const lineDiv = document.createElement('div');
                lineDiv.style.marginBottom = '8px';
                overlay.appendChild(lineDiv);
                
                let cIdx = 0;
                const curLine = lines[lineIdx];

                function typeChar() {
                    if (cIdx < curLine.length) {
                        lineDiv.innerHTML += curLine.charAt(cIdx);
                        cIdx++;
                        overlay.scrollTop = overlay.scrollHeight;
                        setTimeout(typeChar, 25); 
                    } else {
                        lineIdx++;
                        setTimeout(printLines, 200); 
                    }
                }
                typeChar();
            } else {
                setTimeout(() => { 
                    overlay.style.display = 'none'; 
                    win.classList.remove('shaking'); 
                }, 3000);
            }
        }
        printLines();
    }

    window.onload = () => { centerWindow(); resetTyping(); };
    window.onresize = centerWindow;
</script>

</body>
</html>
