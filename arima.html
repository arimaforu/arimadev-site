<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arima216</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #050505;
            --panel: rgba(8, 8, 8, 0.82);
            --panel-strong: rgba(10, 10, 10, 0.92);
            --border: rgba(255, 255, 255, 0.05);
            --border-soft: rgba(255, 255, 255, 0.03);
            --text: #c0c0c0;
            --text-secondary: #7a7a7a;
            --glow: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.14);
            border-radius: 0;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI Variable Display", "Segoe UI", sans-serif;
            position: relative;
        }

        .noise {
            position: fixed;
            inset: 0;
            background: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain_Noise.png");
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

.background {
    position: fixed;
    inset: -20px;

    background:
        linear-gradient(
            rgba(0,0,0,0.25),
            rgba(0,0,0,0.35)
        ),
        url("https://i.pinimg.com/1200x/61/4a/77/614a7793a4377f2ec6896f1ceba83ae6.jpg");

    background-size: cover;
    background-position: center 35%;

    filter:
        blur(8px)
        grayscale(0.85)
        brightness(0.45)
        contrast(1.1);

    transform: scale(1.08);
    z-index: -1;
}

        @keyframes dark-pulse {
            0%, 100% {
                color: #c0c0c0;
                opacity: 0.86;
                text-shadow:
                    0 0 8px rgba(255, 255, 255, 0.08),
                    0 0 20px rgba(0, 0, 0, 0.9);
            }
            50% {
                color: #7b7b7b;
                opacity: 0.58;
                text-shadow:
                    0 0 12px rgba(255, 255, 255, 0.03),
                    0 0 18px rgba(0, 0, 0, 0.95);
            }
        }

        @keyframes glitch-1 {
            0% { transform: translate(0, 0); opacity: 0; }
            20% { transform: translate(-1px, 0); opacity: 0.18; }
            40% { transform: translate(1px, 0); opacity: 0.1; }
            60% { transform: translate(-2px, 0); opacity: 0.2; }
            80% { transform: translate(2px, 0); opacity: 0.12; }
            100% { transform: translate(0, 0); opacity: 0; }
        }

        @keyframes glitch-2 {
            0% { transform: translate(0, 0); opacity: 0; }
            20% { transform: translate(1px, 0); opacity: 0.14; }
            40% { transform: translate(-1px, 0); opacity: 0.1; }
            60% { transform: translate(2px, 0); opacity: 0.18; }
            80% { transform: translate(-2px, 0); opacity: 0.1; }
            100% { transform: translate(0, 0); opacity: 0; }
        }

.window {
    width: 850px;
    max-width: 95vw;
    min-height: 580px;

    background: rgba(10, 10, 10, 0.65);
    backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px;

    box-shadow:
        0 0 80px rgba(0,0,0,0.75),
        0 0 25px rgba(0,0,0,0.5);

    position: relative;
    overflow: hidden;
    z-index: 10;

    display: flex;
    flex-direction: column;
}

.window::before {
    content: "";
    position: absolute;
    inset: 0;

    background:
        linear-gradient(
            rgba(255,255,255,0.015),
            rgba(0,0,0,0.08)
        );

    opacity: 0.6;
    pointer-events: none;
}

        .window-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 20px;
            position: relative;
            z-index: 1;
        }

        .avatar-frame {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 26px;
            filter: grayscale(0.45) contrast(1.2) brightness(0.78);
    box-shadow:
        0 0 30px rgba(0,0,0,0.8),
        0 0 10px rgba(255,255,255,0.08);
        }

        .avatar-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .glitch {
            position: relative;
            display: inline-block;
            color: #c0c0c0;
            font-size: 3.5rem;
            line-height: 1;
            letter-spacing: 18px;
            font-weight: 800;
            text-transform: lowercase;
            cursor: default;
            animation: dark-pulse 4s infinite ease-in-out;
            text-shadow:
                0 0 8px rgba(255, 255, 255, 0.08),
                0 0 20px rgba(0, 0, 0, 0.9);
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            white-space: pre;
        }

        .glitch:hover::before {
            opacity: 0.18;
            color: #9a9a9a;
            transform: translate(-1px, 0);
            animation: glitch-1 0.8s infinite;
        }

        .glitch:hover::after {
            opacity: 0.14;
            color: #e0e0e0;
            transform: translate(1px, 0);
            animation: glitch-2 0.8s infinite;
        }

        .status-bar {
            margin: 26px 0 24px;
            padding: 12px 24px;
            max-width: min(520px, 78vw);
            background: rgba(0, 0, 0, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #8a8a8a;
            font-family: Consolas, monospace;
            font-size: 0.85rem;
            box-shadow: inset 0 0 25px rgba(255, 255, 255, 0.015);
            text-align: center;
        }

        .socials {
            display: flex;
            gap: 30px;
            font-size: 1.4rem;
            margin-bottom: 22px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .socials a {
            color: #404040;
            opacity: 0.72;
            transition: 0.35s ease;
            text-decoration: none;
        }

        .socials a:hover {
            color: #d0d0d0;
            opacity: 1;
            transform: scale(1.12);
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.12));
        }

        .footer-credits {
            font-size: 11px;
            opacity: 0.5;
            letter-spacing: 3px;
            color: #565656;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.03);
            font-family: Consolas, monospace;
            text-align: center;
        }

        @media (max-width: 600px) {
            .window {
                width: 95vw;
                min-height: 520px;
                border-radius: 6px;
            }

            .glitch {
                font-size: 2rem;
                letter-spacing: 6px;
            }

            .socials {
                gap: 22px;
            }

            .status-bar {
                max-width: 86vw;
            }
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="background"></div>

    <div class="window" id="arimaWindow">
        <div class="window-body">
            <div class="avatar-frame">
                <img src="https://i.pinimg.com/736x/8a/5d/8f/8a5d8f9ab6712bd4e7b6e9790c8953ac.jpg" alt="arima">
            </div>

            <div class="glitch" data-text="ａｒｉｍａ">ａｒｉｍａ</div>

            <div class="status-bar">> <span id="typing"></span></div>

            <div class="socials">
                <a href="https://t.me/satorugojojujutsu" target="_blank" rel="noopener noreferrer" title="Telegram">
                    <i class="fab fa-telegram"></i>
                </a>
                <a href="https://github.com/arimaforu" target="_blank" rel="noopener noreferrer" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://steamcommunity.com/id/sugurugetojjk/" target="_blank" rel="noopener noreferrer" title="Steam">
                    <i class="fab fa-steam"></i>
                </a>
                <a href="https://arimadev.ru" target="_blank" rel="noopener noreferrer" title="Перейти к Mizuki (Dark Souls)">
                    <i class="fa-solid fa-door-open"></i>
                </a>
            </div>

            <div class="footer-credits">© 2026 Arima216. LOST IN SILENT HILL</div>
        </div>
    </div>

    <script>
        const typingSpan = document.getElementById('typing');
        const fullText = "In my restless dreams, I see that town...";
        let charIdx = 0;

        function resetTyping() {
            typingSpan.textContent = "";
            charIdx = 0;
            type();
        }

        function type() {
            if (charIdx < fullText.length) {
                typingSpan.textContent += fullText.charAt(charIdx);
                charIdx++;
                setTimeout(type, 70);
            }
        }

        window.addEventListener('load', resetTyping);
    </script>
</body>
</html>
