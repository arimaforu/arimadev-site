<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arima216</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #050505;
            --panel: rgba(10, 10, 10, 0.58);
            --border: rgba(255, 255, 255, 0.05);
            --text: #c0c0c0;
            --text-secondary: #7a7a7a;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.14);
            border-radius: 0;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI Variable Display", "Segoe UI", sans-serif;
            position: relative;
        }

        .noise {
            position: fixed;
            inset: 0;
            background: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain_Noise.png");
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

        .background {
            position: fixed;
            inset: -20px;
            background:
                linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.35)),
                url("https://i.pinimg.com/736x/f6/46/44/f6464445499b1b78c4359e28ff7cd998.jpg");
            background-size: cover;
            background-position: center 35%;
            filter:
                blur(4px)
                grayscale(0.85)
                brightness(0.45)
                contrast(1.1);
            transform: scale(1.08);
            z-index: -1;
        }

        @keyframes dark-pulse {
            0%, 100% {
                color: #c0c0c0;
                opacity: 0.86;
                text-shadow:
                    0 0 8px rgba(255, 255, 255, 0.08),
                    0 0 20px rgba(0, 0, 0, 0.9);
            }
            50% {
                color: #7b7b7b;
                opacity: 0.58;
                text-shadow:
                    0 0 12px rgba(255, 255, 255, 0.03),
                    0 0 18px rgba(0, 0, 0, 0.95);
            }
        }

        @keyframes glitch-1 {
            0%   { transform: translate(0, 0); opacity: 0; }
            20%  { transform: translate(-1px, 0); opacity: 0.18; }
            40%  { transform: translate(1px, 0); opacity: 0.10; }
            60%  { transform: translate(-2px, 0); opacity: 0.20; }
            80%  { transform: translate(2px, 0); opacity: 0.12; }
            100% { transform: translate(0, 0); opacity: 0; }
        }

        @keyframes glitch-2 {
            0%   { transform: translate(0, 0); opacity: 0; }
            20%  { transform: translate(1px, 0); opacity: 0.14; }
            40%  { transform: translate(-1px, 0); opacity: 0.10; }
            60%  { transform: translate(2px, 0); opacity: 0.18; }
            80%  { transform: translate(-2px, 0); opacity: 0.10; }
            100% { transform: translate(0, 0); opacity: 0; }
        }

        .window {
            /* Жестко фиксируем разрешение окна */
            width: 760px;
            height: 560px;
            max-width: 95vw;
            max-height: 95vh;
            background: var(--panel);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow:
                0 0 80px rgba(0,0,0,0.75),
                0 0 25px rgba(0,0,0,0.50);
            position: relative;
            overflow: hidden;
            z-index: 10;
            display: flex;
        }

        .window::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(255,255,255,0.015), rgba(0,0,0,0.08));
            opacity: 0.6;
            pointer-events: none;
        }

        .window-body {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            position: relative;
            z-index: 1;

            /* Переводим на Flexbox для идеального распределения по высоте 560px */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 35px 40px;
        }

        .top-area {
            display: flex;
            margin-top: 22px;
            justify-content: center;
            align-items: center;
        }

        .avatar-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid #202020;
            filter: grayscale(0.45) contrast(1.2) brightness(0.78);
            box-shadow:
                0 0 60px rgba(0,0,0,0.9),
                0 0 12px rgba(255,255,255,0.04);
            flex: 0 0 auto;
        }

        .avatar-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 15%;
            display: block;
        }

        .middle-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-top: -30px;
            align-items: center;
            width: 100%;
        }

        .glitch {
            position: relative;
            display: inline-block;
            transform: translateX(6px);
            margin: 0 0 24px 0;
            color: #c0c0c0;
            font-size: clamp(2.8rem, 4.8vw, 4rem);
            line-height: 1;
            letter-spacing: 16px;
            font-weight: 800;
            text-transform: lowercase;
            cursor: default;
            animation: dark-pulse 4s infinite ease-in-out;
            text-shadow:
                0 0 8px rgba(255, 255, 255, 0.08),
                0 0 20px rgba(0, 0, 0, 0.9);
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            white-space: pre;
        }

        .glitch:hover::before {
            opacity: 0.18;
            color: #9a9a9a;
            transform: translate(-1px, 0);
            animation: glitch-1 0.8s infinite;
        }

        .glitch:hover::after {
            opacity: 0.14;
            color: #e0e0e0;
            transform: translate(1px, 0);
            animation: glitch-2 0.8s infinite;
        }

        .status-bar {
            width: 100%;
            max-width: 560px;
            min-height: 44px;
            padding: 0 18px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #8a8a8a;
            font-family: Consolas, monospace;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            overflow: hidden;
            box-shadow: inset 0 0 25px rgba(255, 255, 255, 0.015);
            letter-spacing: 0.04em;
        }

        .bottom-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .line {
            width: 140px;
            height: 1px;
            background: rgba(255,255,255,0.08);
            opacity: 0.6;
        }

        .socials {
            display: flex;
            gap: 34px;
            justify-content: center;
            align-items: center;
            font-size: 1.45rem;
            margin: 0;
        }

        .socials a {
            color: #404040;
            opacity: 0.72;
            transition: 0.35s ease;
            text-decoration: none;
        }

        .socials a:hover {
            color: #d0d0d0;
            opacity: 1;
            transform: scale(1.12);
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.12));
        }

        .footer-credits {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            letter-spacing: 3px;
            color: #565656;
            opacity: 0.45;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.03);
            font-family: Consolas, monospace;
            z-index: 50;
            pointer-events: none;
        }

        /* Сохраняем адаптивность, если окно браузера станет меньше 760x560 */
        @media (max-width: 780px), (max-height: 580px) {
            .window {
                width: 95vw;
                height: 90vh;
                min-height: 480px;
                border-radius: 6px;
            }

            .window-body {
                padding: 25px 20px;
            }

            .avatar-frame {
                width: 120px;
                height: 120px;
            }

            .glitch {
                font-size: 2.2rem;
                letter-spacing: 6px;
                margin-bottom: 16px;
            }

            .status-bar {
                width: 100%;
                max-width: 400px;
                min-height: 42px;
                font-size: 0.74rem;
            }

            .socials {
                gap: 22px;
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="background"></div>

    <div class="window" id="arimaWindow">
        <div class="window-body">
            <div class="top-area">
                <div class="avatar-frame">
                    <img src="https://i.pinimg.com/736x/25/ac/d8/25acd8e2a29af7169675981f12369a89.jpg" alt="arima">
                </div>
            </div>

            <div class="middle-area">
                <div class="glitch" data-text="ａｒｉｍａ">ａｒｉｍａ</div>

                <div class="status-bar">
                    &gt; <span id="typing"></span>
                </div>
            </div>

            <div class="bottom-area">
                <div class="line"></div>

                <div class="socials">
                    <a href="https://t.me/satorugojojujutsu" target="_blank" rel="noopener noreferrer" title="Telegram">
                        <i class="fab fa-telegram"></i>
                    </a>
                    <a href="https://github.com/arimaforu" target="_blank" rel="noopener noreferrer" title="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="https://steamcommunity.com/id/sugurugetojjk/" target="_blank" rel="noopener noreferrer" title="Steam">
                        <i class="fab fa-steam"></i>
                    </a>
                    <a href="https://arimadev.ru" target="_blank" rel="noopener noreferrer" title="">
                        <i class="fa-solid fa-door-open"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-credits">© 2026 Arima216</div>

    <script>
        const typingSpan = document.getElementById('typing');
        const fullText = "Why don't I ever realize what I have until it's lost to me?";
        let charIdx = 0;

        function resetTyping() {
            typingSpan.textContent = "";
            charIdx = 0;
            type();
        }

        function type() {
            if (charIdx < fullText.length) {
                typingSpan.textContent += fullText.charAt(charIdx);
                charIdx++;
                setTimeout(type, 67);
            }
        }

        window.addEventListener('load', resetTyping);
    </script>
</body>
</html>
