<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERROR | THE VOID</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --glitch-color: #fff;
            --void-bg: #050505;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #050505;
            color: var(--glitch-color);
            font-family: 'VT323', monospace;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Эффект сканирующих линий (CRT) */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;

    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.04) 0px,
            rgba(255,255,255,0.04) 1px,
            transparent 2px,
            transparent 4px
        );

    opacity: 0.35;
}

        /* Контейнер с помехами */
#static-canvas {
    position: fixed;
    inset: 0;
    opacity: 0.05;
    z-index: 1;
}

        .content {
            position: relative; z-index: 10;
            text-align: center;
        }

.error-code {
    position: relative;
    font-size: clamp(8rem, 20vw, 16rem);
    line-height: 0.9;
    font-weight: 700;
    letter-spacing: 8px;
    color: #e6e6e6;

    text-shadow:
        0 0 8px rgba(255,255,255,0.1),
        0 0 35px rgba(0,0,0,0.9);

    animation: glitch-skew 4s infinite;
}

        /* Эффект раздвоения (Glitch) */

        .error-code::before,
.error-code::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
}

.error-code::before {
    transform: translateX(2px);
    text-shadow: -3px 0 rgba(255,255,255,0.3);
    animation: glitch-top 3s infinite steps(1);
}

.error-code::after {
    transform: translateX(-2px);
    text-shadow: 3px 0 rgba(120,120,120,0.35);
    animation: glitch-bottom 2.5s infinite steps(1);
}

.message {
    margin-top: 15px;
    color: #666;
    letter-spacing: 5px;
    font-size: 1.1rem;
    text-transform: uppercase;
}

.back-link {
    display: inline-block;
    margin-top: 45px;

    padding: 12px 40px;

    color: #777;
    border: 1px solid #2a2a2a;
    background: rgba(255,255,255,0.015);

    text-decoration: none;
    font-family: "Cinzel", serif;

    letter-spacing: 3px;
    transition: 0.35s;
}

.vignette {
    position: fixed;
    inset: 0;

    background:
        radial-gradient(
            circle,
            transparent 35%,
            rgba(0,0,0,0.85) 100%
        );

    pointer-events: none;
    z-index: 5;
}

.back-link:hover {
    color: #fff;
    border-color: #555;

    box-shadow:
        0 0 25px rgba(255,255,255,0.07),
        inset 0 0 15px rgba(255,255,255,0.02);

    transform: translateY(-2px);
}

        @keyframes glitch-skew {
            0% { transform: skew(1deg); }
            10% { transform: skew(-1deg); }
            100% { transform: skew(0deg); }
        }

        @keyframes glitch-top {
    0%, 90%, 100% {
        clip-path: inset(0 0 100% 0);
    }

    92% {
        clip-path: inset(15% 0 65% 0);
    }

    95% {
        clip-path: inset(45% 0 35% 0);
    }
}

@keyframes glitch-bottom {
    0%, 85%, 100% {
        clip-path: inset(100% 0 0 0);
    }

    88% {
        clip-path: inset(65% 0 15% 0);
    }

    93% {
        clip-path: inset(30% 0 45% 0);
    }
}


    </style>
</head>
<body>
    

    <canvas id="static-canvas"></canvas>

    <div class="vignette"></div>

    <div class="content">
        <h1 class="error-code" data-text="404">404</h1>
        <p class="message">Signal Lost in the Void</p>
        <a href="/" class="back-link">Return</a>
    </div>

    <script>
        const canvas = document.getElementById('static-canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
        }

        function noise() {
            const imageData = ctx.createImageData(canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const val = Math.random() * 25;
                data[i] = val;     // R
                data[i + 1] = val; // G
                data[i + 2] = val; // B
                data[i + 3] = 255; // A
            }
            ctx.putImageData(imageData, 0, 0);
            setTimeout(noise, 45);
        }

        window.addEventListener('resize', resize);
        resize();
        noise();

        // Случайные подергивания текста
        setInterval(() => {
            const el = document.querySelector('.error-code');
            if (Math.random() > 0.985) {
el.style.transform =
`translate(${Math.random()*2 - 1}px, ${Math.random()*2 - 1}px)`;

setTimeout(() => {
    el.style.transform = 'translate(0,0)';
}, 50);
            }
        }, 100);
    </script>
</body>
</html>
